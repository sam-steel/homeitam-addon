name: "HomeITAM"
version: "1.0.0"
slug: "homeitam"
description: "Local IT Asset Management for your smart home infrastructure."
url: "https://github.com/yourusername/homeitam-addon"
arch:
  - aarch64
  - amd64
# THE MAGIC KEY: This tells HA to pull your compiled image, not build from source
image: "ghcr.io/yourusername/homeitam-core/{arch}"
startup: application
ports:
  8000/tcp: 8000
ports_description:
  8000/tcp: "HomeITAM Web Interface"
options:
  license_key: ""
schema:
  license_key: "str"
